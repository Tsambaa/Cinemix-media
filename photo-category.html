<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Category — Cinemix Media</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--black:#080808;--white:#f0ede8;--accent:#6dd230;--gray:#141414;--mid:#252525;--muted:#555;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;font-weight:300;cursor:none;overflow-x:hidden;}
.cursor{position:fixed;width:10px;height:10px;background:var(--accent);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:width .15s,height .15s;mix-blend-mode:difference;}
.cursor-ring{position:fixed;width:36px;height:36px;border:1px solid rgba(109,210,48,0.35);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .25s,height .25s;}
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;justify-content:space-between;align-items:center;padding:18px 48px;background:rgba(8,8,8,0.93);backdrop-filter:blur(14px);border-bottom:1px solid rgba(255,255,255,0.04);}
.logo-link{text-decoration:none;}
.nav-links{display:flex;gap:40px;list-style:none;}
.nav-links a{font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;position:relative;}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--accent);transition:width .3s;}
.nav-links a:hover,.nav-links a.active{color:var(--white);}
.nav-links a:hover::after,.nav-links a.active::after{width:100%;}
.burger{display:none;background:none;border:none;color:var(--white);font-size:22px;cursor:none;}
.mob{display:none;position:fixed;inset:0;background:rgba(8,8,8,0.98);z-index:300;flex-direction:column;align-items:center;justify-content:center;gap:44px;}
.mob.open{display:flex;}
.mob a{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:4px;color:var(--white);text-decoration:none;transition:color .3s;}
.mob a:hover{color:var(--accent);}
.mob-x{position:absolute;top:24px;right:32px;background:none;border:none;color:var(--muted);font-size:24px;cursor:none;}
footer{background:var(--gray);border-top:1px solid var(--mid);padding:26px 48px;display:flex;justify-content:space-between;align-items:center;}
.footer-copy{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.96);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(12px);}
.modal-overlay.open{display:flex;animation:fadeIn .3s ease;}
.modal-inner{position:relative;width:90vw;max-width:980px;}
.modal-close{position:absolute;top:-40px;right:0;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);background:none;border:none;cursor:none;text-transform:uppercase;transition:color .3s;}
.modal-close:hover{color:var(--accent);}
.modal-video{position:relative;padding-bottom:56.25%;height:0;}
.modal-video iframe{position:absolute;inset:0;width:100%;height:100%;border:none;}
.lb{position:fixed;inset:0;background:rgba(0,0,0,0.97);z-index:1000;display:none;align-items:center;justify-content:center;}
.lb.open{display:flex;animation:fadeIn .3s ease;}
.lb-img{max-width:88vw;max-height:88vh;object-fit:contain;}
.lb-x{position:absolute;top:20px;right:28px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--muted);background:none;border:none;cursor:none;text-transform:uppercase;}
.lb-x:hover{color:var(--accent);}
.lb-arr{position:absolute;top:50%;transform:translateY(-50%);font-size:36px;color:rgba(255,255,255,0.3);background:none;border:none;cursor:none;padding:16px;transition:color .3s;}
.lb-arr:hover{color:var(--accent);}
.lb-l{left:8px;}.lb-r{right:8px;}
.lb-n{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);}
.page-hero{min-height:44vh;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 48px 48px;}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:brightness(0.2);}
.hero-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,8,8,1) 0%,rgba(8,8,8,.05) 70%,transparent 100%);}
.bc{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;position:relative;z-index:2;opacity:0;animation:fadeUp .7s .2s forwards;}
.bc a{color:var(--muted);text-decoration:none;transition:color .3s;}.bc a:hover{color:var(--accent);}.bc span{color:var(--accent);margin:0 6px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(56px,10vw,130px);line-height:.88;position:relative;z-index:2;opacity:0;animation:fadeUp .7s .4s forwards;}
.dim{color:transparent;-webkit-text-stroke:1px rgba(255,255,255,0.16);}
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:768px){nav{padding:14px 20px;}.nav-links{display:none;}.burger{display:block;}footer{flex-direction:column;gap:10px;text-align:center;padding:22px 20px;}.page-hero{padding:0 20px 40px;}}

.projs-wrap{padding:40px 48px 80px;}
.projs-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;}
.proj-card{text-decoration:none;color:var(--white);cursor:none;display:flex;flex-direction:column;background:var(--gray);border:1px solid transparent;transition:border-color .3s;overflow:hidden;}
.proj-card:hover{border-color:var(--accent);}
.proj-img{position:relative;overflow:hidden;aspect-ratio:4/3;}
.proj-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .6s ease;}
.proj-card:hover .proj-img img{transform:scale(1.05);}
.proj-hov{position:absolute;inset:0;background:rgba(8,8,8,.55);opacity:0;transition:opacity .4s;display:flex;align-items:center;justify-content:center;}
.proj-card:hover .proj-hov{opacity:1;}
.proj-hov span{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent);padding:9px 18px;}
.proj-info{padding:20px 24px;}
.proj-meta{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:7px;}
.proj-name{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;margin-bottom:7px;}
.proj-desc{font-size:13px;line-height:1.7;color:var(--muted);}
.proj-ph{background:var(--gray);border:1px dashed var(--mid);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;aspect-ratio:4/3;color:var(--mid);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;}
@media(max-width:768px){.projs-wrap{padding:20px;}.projs-grid{grid-template-columns:1fr;}}
</style>
</head>

const D=window.SITE_DATA;

document.getElementById('siteNav').innerHTML=`
  <a href="index.html" class="logo-link"><img src="${D.site.logo}" alt="Cinemix Media" style="height:36px;width:auto;"/></a>
  <ul class="nav-links">
    <li><a href="photography.html" ${'photography'==='photography'?'class="active"':''}>Photography</a></li>
    <li><a href="video.html" ${'photography'==='video'?'class="active"':''}>Video</a></li>
    <li><a href="index.html#contact">Contact</a></li>
    <li><a href="admin.html" style="color:var(--accent);opacity:.5;font-size:9px;">⚙ Admin</a></li>
  </ul>
  <button class="burger" onclick="toggleMob()">☰</button>
`;
document.getElementById('siteFoot').innerHTML=`
  <a href="index.html"><img src="${D.site.logo}" alt="Cinemix Media" style="height:28px;width:auto;"/></a>
  <p class="footer-copy">© 2025 ${D.site.name} · ${D.site.owner}</p>
`;

// Cursor
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function a(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a);})();
document.querySelectorAll('a,button,[data-h]').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.width='18px';cur.style.height='18px';ring.style.width='50px';ring.style.height='50px';});
  el.addEventListener('mouseleave',()=>{cur.style.width='10px';cur.style.height='10px';ring.style.width='36px';ring.style.height='36px';});
});
// Scroll reveal
const sobs=new IntersectionObserver((en)=>{en.forEach((e,i)=>{if(e.isIntersecting){setTimeout(()=>e.target.classList.add('visible'),i*60);}});},{threshold:.08});
document.querySelectorAll('.reveal').forEach(el=>sobs.observe(el));
// Mobile menu
function toggleMob(){document.getElementById('mob').classList.toggle('open');}
// YT Modal
function openYT(id){document.getElementById('ytF').src='https://www.youtube.com/embed/'+id+'?autoplay=1';document.getElementById('ytM').classList.add('open');document.body.style.overflow='hidden';}
function closeYT(){document.getElementById('ytF').src='';document.getElementById('ytM').classList.remove('open');document.body.style.overflow='';}
// Lightbox
let lbArr=[],lbI=0;
function openLB(arr,i){lbArr=arr;lbI=i;document.getElementById('lbImg').src=arr[i];document.getElementById('lbN').textContent=(i+1)+' / '+arr.length;document.getElementById('lb').classList.add('open');document.body.style.overflow='hidden';}
function closeLB(){document.getElementById('lb').classList.remove('open');document.body.style.overflow='';}
function moveLB(d){lbI=(lbI+d+lbArr.length)%lbArr.length;document.getElementById('lbImg').src=lbArr[lbI];document.getElementById('lbN').textContent=(lbI+1)+' / '+lbArr.length;}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeYT();closeLB();}if(e.key==='ArrowLeft')moveLB(-1);if(e.key==='ArrowRight')moveLB(1);});


const params=new URLSearchParams(location.search);
const catId=params.get('cat')||'body-profile';
const cat=D.photoCategories.find(c=>c.id===catId)||D.photoCategories[0];
const projs=D.photoProjects.filter(p=>p.category===catId);
const imgs=D.images;
if(cat){
  document.getElementById('heroBg').style.backgroundImage=`url(${imgs[cat.cover]||''})`;
  document.getElementById('bcCat').textContent=cat.name;
  document.getElementById('pageTitle').textContent=cat.name;
}
document.getElementById('projGrid').innerHTML=projs.map(p=>`
  <a href="photo-project.html?id=${p.id}" class="proj-card reveal" data-h>
    <div class="proj-img">
      <img src="${imgs[p.cover]||''}" alt="${p.name}" loading="lazy"/>
      <div class="proj-hov"><span>View Project →</span></div>
    </div>
    <div class="proj-info">
      <p class="proj-meta">${cat?cat.name:''} · ${p.year}</p>
      <h3 class="proj-name">${p.name}</h3>
      <p class="proj-desc">${p.desc}</p>
    </div>
  </a>`).join('')+
  `<div class="proj-ph reveal"><span style="font-size:22px;opacity:.1;">📸</span><p>Add in Admin</p></div>
   <div class="proj-ph reveal"><span style="font-size:22px;opacity:.1;">📸</span><p>Add in Admin</p></div>`;
document.querySelectorAll('.reveal').forEach(el=>sobs.observe(el));

</script>
